name: Postar Instagram Merkkava

on:
  # Postagem agora e 100% manual via Claude - sem agendamento automatico
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests

      - name: Postar no Instagram
        env:
          META_INSTAGRAM_TOKEN: ${{ secrets.META_INSTAGRAM_TOKEN }}
          META_INSTAGRAM_ACCOUNT_ID: ${{ secrets.META_INSTAGRAM_ACCOUNT_ID }}
        run: python post_instagram.py
